<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>詩魂迷宮：忘詩之霧</title>
<style>
:root {
    --bg-color: #f7f3ea; --container-bg: rgba(255, 253, 248, 0.92);
    --text-color: #4a4030; --sub-text: #8a7f68;
    --accent-color: #b8742f; --success-color: #5d7a3a; --error-color: #a8403a;
    --item-color: #c9971f; --border-color: #ddd2ba;
    --ink-shadow: 0 2px 18px rgba(74, 64, 48, 0.12); --grid-color: rgba(184, 116, 47, 0.04);
}
* { box-sizing: border-box; }
body {
    background-color: var(--bg-color); color: var(--text-color);
    font-family: "Noto Serif TC", "PingFang TC", "Microsoft JhengHei", serif;
    padding: 20px; margin: 0;
    background-image:
        radial-gradient(circle at 20% 20%, var(--grid-color) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, var(--grid-color) 0%, transparent 50%);
    transition: all 1s ease;
    min-height: 100vh;
}
body.bg-night {
    --bg-color: #1c1a24; --text-color: #d8cfb8; --accent-color: #c9a14f;
    --border-color: #3a3548; --container-bg: rgba(30, 28, 38, 0.92); --sub-text: #9892a8;
}
body.bg-ending { background: #0d0c14 !important; overflow: hidden !important; }

.container { max-width: 720px; margin: 10px auto; background: var(--container-bg); padding: 28px; border-radius: 14px; border: 1px solid var(--border-color); box-shadow: var(--ink-shadow); position: relative; transition: all 1s ease; }
.container.ending-fullscreen { max-width: 100% !important; margin: 0 !important; padding: 0 !important; background: transparent !important; border: none !important; box-shadow: none !important; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 90vh; }

.status-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(184, 116, 47, 0.08); padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 20px; flex-wrap: wrap; gap: 8px; }
.inventory-items { display: flex; gap: 8px; font-size: 22px; min-height: 28px; align-items: center; flex-wrap: wrap; }
.inv-item { cursor: pointer; transition: transform 0.2s; padding: 2px 5px; border-radius: 5px; }
.inv-item:hover { transform: scale(1.25); background: rgba(184, 116, 47, 0.12); }
.potion-box { color: var(--success-color); font-weight: bold; display: flex; align-items: center; gap: 5px; font-size: 14px; background: rgba(93, 122, 58, 0.1); padding: 5px 10px; border-radius: 5px; border: 1px solid var(--success-color); white-space: nowrap; }
.location-badge { color: var(--accent-color); font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 5px; }

.hologram-map { background: rgba(184, 116, 47, 0.05); border: 1px solid var(--border-color); padding: 14px; border-radius: 8px; margin-top: 22px; }
.map-title { font-size: 12px; color: var(--accent-color); font-weight: bold; margin-bottom: 10px; letter-spacing: 1px; text-align: center; }
.map-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.map-cell { background: rgba(255,255,255,0.4); border: 1px solid var(--border-color); padding: 8px 4px; border-radius: 6px; text-align: center; font-size: 11px; color: var(--sub-text); cursor: not-allowed; transition: all 0.3s; }
.map-cell.unlocked { border-color: var(--sub-text); color: var(--text-color); cursor: pointer; }
.map-cell.unlocked:hover { border-color: var(--accent-color); background: rgba(184, 116, 47, 0.08); }
.map-cell.current { border-color: var(--item-color); color: var(--item-color); font-weight: bold; background: rgba(201, 151, 31, 0.12); cursor: pointer; }

h1 { text-align: center; font-size: 26px; letter-spacing: 4px; margin-bottom: 4px; font-weight: 700; }
.subtitle { text-align: center; color: var(--sub-text); margin-bottom: 22px; font-size: 13px; letter-spacing: 1px; }

.story-box { background: rgba(184, 116, 47, 0.06); border-left: 4px solid var(--accent-color); padding: 14px 18px; margin-bottom: 18px; border-radius: 0 8px 8px 0; font-size: 14px; line-height: 1.8; }
.story-text { font-size: 1.05em; line-height: 1.9; margin-bottom: 18px; padding: 22px; border: 1px solid var(--accent-color); border-radius: 8px; background: rgba(255,255,255,0.5); text-align: left; white-space: pre-wrap; }

.doors-container { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 18px; }
.door-card { background: rgba(255,255,255,0.5); border: 2px solid var(--border-color); border-radius: 10px; padding: 18px 10px; text-align: center; cursor: pointer; transition: all 0.3s; }
.door-card:hover { border-color: var(--accent-color); transform: translateY(-3px); background: rgba(184,116,47,0.06); }
.door-dir { font-size: 12px; color: var(--sub-text); margin-bottom: 6px; font-weight: bold; }
.door-name { font-weight: bold; color: var(--text-color); font-size: 15px; }
.door-unknown { color: var(--sub-text); font-style: italic; }

.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(20,18,14,0.75); z-index: 1000; display: flex; justify-content: center; align-items: center; padding: 20px; }
.item-box { background: var(--bg-color); border: 1px solid var(--item-color); padding: 28px; border-radius: 12px; text-align: center; width: 100%; max-width: 380px; position: relative; max-height: 88vh; overflow-y: auto; }
.item-icon { font-size: 54px; margin-bottom: 12px; }
.item-title { color: var(--item-color); font-size: 20px; font-weight: bold; margin-bottom: 12px; }
.item-desc { font-size: 14px; line-height: 1.7; margin-bottom: 18px; }
.inspect-text { color: var(--accent-color); font-weight: bold; font-size: 14px; line-height: 1.7; margin-top: 14px; padding: 14px; border: 1px dashed var(--accent-color); background: rgba(184,116,47,0.05); border-radius: 8px; white-space: pre-wrap; text-align: left; }

.combine-container { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-top: 18px; }
.combine-slot { flex: 1; border: 2px dashed var(--sub-text); padding: 18px; border-radius: 10px; text-align: center; cursor: pointer; color: var(--sub-text); font-weight: bold; background: rgba(255,255,255,0.3); transition: all 0.3s; font-size: 28px; min-height: 80px; display: flex; align-items: center; justify-content: center; }
.combine-slot:hover { border-color: var(--item-color); color: var(--item-color); }
.combine-slot.active-slot { border-color: var(--accent-color); border-style: solid; background: rgba(184,116,47,0.08); color: var(--text-color); transform: scale(1.04); }
.combine-slot.filled { border-color: var(--success-color); border-style: solid; }

.quiz-card { background: rgba(255,255,255,0.45); padding: 22px; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 18px; }
.type-badge { display: inline-block; padding: 4px 10px; font-size: 11px; border-radius: 20px; font-weight: bold; margin-bottom: 14px; background: rgba(184,116,47,0.12); color: var(--accent-color); border: 1px solid var(--accent-color); }
.question-text { font-size: 16px; font-weight: bold; line-height: 1.7; margin-bottom: 18px; white-space: pre-wrap; }
.option-item { background: rgba(255,255,255,0.5); border: 1px solid var(--border-color); padding: 13px 16px; margin-bottom: 10px; border-radius: 8px; display: flex; align-items: center; cursor: pointer; transition: all 0.2s; text-align: left; }
.option-item:hover { border-color: var(--accent-color); background: rgba(184,116,47,0.05); }
.option-item input { margin-right: 14px; transform: scale(1.2); cursor: pointer; }
.sort-item { background: rgba(255,255,255,0.5); border: 1px solid var(--border-color); padding: 11px 16px; margin-bottom: 9px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
.sort-text { flex-grow: 1; padding-right: 14px; font-size: 14px; line-height: 1.6; }
.sort-btns { display: flex; gap: 6px; }
.sort-btn { background: rgba(184,116,47,0.1); color: var(--accent-color); border: 1px solid var(--border-color); padding: 6px 11px; border-radius: 6px; cursor: pointer; font-size: 12px; }
textarea { width: 100%; height: 110px; background: rgba(255,255,255,0.6); color: var(--text-color); border: 1px solid var(--border-color); border-radius: 8px; padding: 14px; box-sizing: border-box; resize: none; font-size: 14px; line-height: 1.6; font-family: inherit; }

button.action-btn { background: transparent; color: var(--accent-color); border: 2px solid var(--accent-color); padding: 13px 18px; width: 100%; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: bold; margin-top: 14px; letter-spacing: 2px; transition: all 0.3s; font-family: inherit; }
button.action-btn:hover:not(:disabled) { background: var(--accent-color); color: #fff; }
button.potion-btn { border-color: var(--success-color); color: var(--success-color); margin-bottom: 14px; display: none; }
button.potion-btn:hover { background: var(--success-color); color: #fff; }

.message { margin-top: 18px; padding: 14px; border-radius: 8px; font-weight: bold; text-align: left; font-size: 14px; display: none; white-space: pre-wrap; line-height: 1.6; }
.msg-success { display: block; background: rgba(93,122,58,0.1); color: var(--success-color); border: 1px solid var(--success-color); text-align: center; }
.msg-error { display: block; background: rgba(168,64,58,0.1); color: var(--error-color); border: 1px solid var(--error-color); }
.msg-hint { background: rgba(93,122,58,0.06); border: 1px dashed var(--success-color); padding: 11px; border-radius: 8px; font-weight: normal; margin-bottom: 9px; text-align: left; font-size: 13px; line-height: 1.6; }
.hidden { display: none !important; }
input.text-input { width: 100%; padding: 13px; background: rgba(255,255,255,0.6); color: var(--text-color); border: 1px solid var(--border-color); border-radius: 8px; box-sizing: border-box; font-size: 15px; text-align: center; font-family: inherit; }
.word-count { text-align: right; font-size: 12px; color: var(--sub-text); margin-top: 5px; }

/* ===== 結局動畫 ===== */
.ending-items-container { position: relative; height: 380px; width: 100%; max-width: 600px; display: flex; justify-content: center; align-items: center; margin-top: 20px; }
@keyframes fadeOutText { 0% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; } }
.ending-item { position: absolute; font-size: 32px; opacity: 0; animation: converge 3s forwards; }
@keyframes converge { 0% { transform: translate(var(--startX), var(--startY)) scale(1); opacity: 0; } 20% { opacity: 1; } 80% { transform: translate(0,0) scale(0.5); opacity: 1; filter: brightness(1.4); } 100% { transform: translate(0,0) scale(0); opacity: 0; filter: brightness(2); } }
.scroll-glow { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 2px; height: 200px; background: #fff3da; box-shadow: 0 0 40px 20px #fff3da, 0 0 100px 50px #c9a14f; opacity: 0; z-index: 5; animation: explodeLight 5s 4.5s forwards; }
@keyframes explodeLight { 0% { opacity:0; width:2px; } 10% { opacity:1; width:20px; box-shadow:0 0 70px 35px #fff3da; } 100% { opacity:1; width:1800px; height:1800px; border-radius:50%; box-shadow:0 0 250px 120px #fff3da, 0 0 500px 300px #c9a14f; background:#fff8ec; } }
.flying-blossom { position: absolute; font-size: 60px; opacity: 0; z-index: 20; animation: flyTowards 4s 5s forwards; }
@keyframes flyTowards { 0% { opacity:0; transform: scale(0.1); } 20% { opacity:1; } 100% { opacity:0; transform: scale(15); } }
.final-text-victory { position: absolute; z-index: 30; opacity: 0; color: #2a2410; text-shadow: 0 0 20px #fff3da, 0 0 30px #c9a14f; text-align: center; animation: showVictory 2s 6.8s forwards; }
@keyframes showVictory { 0% { opacity:0; transform: translateY(25px); } 100% { opacity:1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="container" id="main-container">
  <div id="status-ui" class="status-bar hidden">
    <div class="location-badge" id="current-location">📍 載入中...</div>
    <div style="display:flex; align-items:center; gap:16px; flex-wrap:wrap;">
      <div id="inventory-list" class="inventory-items"></div>
      <div class="potion-box" title="消耗墨水可獲取提示">🖋️ 墨水 x<span id="potion-count">0</span></div>
    </div>
  </div>

  <div id="login-section">
    <h1>詩魂迷宮</h1>
    <div class="subtitle">忘詩之霧 // 詩稿尋回之旅</div>
    <div class="quiz-card" style="text-align:center;">
      <div class="story-box" style="text-align:left;">
        【傳說】... 一場「忘詩之霧」籠罩了詩國，五位詩人的詩稿被封印在迷宮深處。<br><br>
        ⚠️ 你必須穿越迷宮，解開詩句謎題，蒐集道具，找回失落的詩稿，喚醒沉睡的詩魂。
      </div>
      <button type="button" class="action-btn" onclick="startGame()">踏入迷宮 →</button>
    </div>
  </div>

  <div id="game-content" class="hidden"></div>

  <div id="map-ui" class="hologram-map hidden">
    <div class="map-title">🗺️ 詩境迷宮圖（可跳轉已探索之地）</div>
    <div class="map-grid" id="dynamic-map-grid"></div>
  </div>
</div>

<div id="item-modal" class="modal-overlay hidden">
  <div class="item-box">
    <div style="position:absolute; top:14px; right:18px; cursor:pointer; font-size:22px; color:var(--sub-text);" onclick="closeItemModal()">✖</div>
    <div id="modal-icon" class="item-icon"></div>
    <div id="modal-title" class="item-title"></div>
    <div id="modal-desc" class="item-desc"></div>
    <button type="button" id="modal-inspect-btn" class="action-btn" onclick="inspectItem()">🔍 深度觀察</button>
    <div id="modal-inspect-text" class="inspect-text hidden"></div>
  </div>
</div>

<script>
// ================= 道具資料庫 =================
const itemDB = {
  '🌙': { title:"靜夜思·月光碎片", desc:"李白詩稿散落的第一片月光。", inspect:"碎片中浮現微光文字：『舉頭望明月，低頭思故鄉。』似乎還缺一個字……" },
  '🌸': { title:"春曉·落花殘瓣", desc:"孟浩然詩稿沾染的春日花瓣。", inspect:"花瓣上沾著夜雨痕跡，隱約有字跡：『夜來風雨聲』" },
  '🏔️': { title:"鸛雀樓·登高令牌", desc:"王之渙詩稿化成的玉令。", inspect:"令牌正面刻著黃河奔流的紋路，背面則是空白，等待填上最後一字。" },
  '🍂': { title:"楓橋·寒鐘餘音", desc:"張繼詩稿凝結的鐘聲殘響。", inspect:"餘音中迴盪著姑蘇城外的鐘聲，似乎能指引一座寺廟的方位。" },
  '🌊': { title:"水調歌頭·千里月魂", desc:"蘇軾詩稿匯聚的月光精魄。", inspect:"月魂中浮現一句未完的詞：『但願人長久，千里＿嬋娟。』" },
  '📜': { title:"忘詩之霧凝結卷", desc:"霧氣凝結而成的神秘卷軸。", inspect:"卷軸上寫著：『五詩合一，詩魂方醒。』" },
  '🖌️': { title:"墨仙的斷筆", desc:"傳說中墨仙留下的筆鋒。", inspect:"筆尖還殘留一絲墨香，似乎能喚醒沉睡的詩句。" },
  '🏮': { title:"詩魂引路燈", desc:"照亮迷宮深處的微光燈籠。", inspect:"燈籠裡的火光忽明忽暗，彷彿在回應你的腳步聲。" },
  '🗝️': { title:"詩境融合鑰", desc:"融合月光與燈火而成的鑰匙。", inspect:"鑰匙散發溫潤的光，似乎能開啟通往詩魂核心的門。" },
  '🕊️': { title:"詩魂覺醒之羽", desc:"象徵詩魂甦醒的羽毛。", inspect:"羽毛輕盈如詩，握在手中彷彿能聽見五首詩同時被吟誦。" }
};

function getItemInfo(rawIcon) {
  const cleanStr = s => s ? s.replace(/\uFE0F/g, '').trim() : '';
  const target = cleanStr(rawIcon);
  for (let key in itemDB) { if (cleanStr(key) === target) return itemDB[key]; }
  return { title:"未知卷軸", desc:"無法辨識的詩意碎片。", inspect:"沒有發現特別之處。" };
}

// ================= NPC 隨機字音字形題庫 =================
const trapDatabase = [
  { q:"「偃」旗息鼓的注音是？", options:[{t:"ㄧㄢˇ",c:true},{t:"ㄧㄢˋ",c:false}] },
  { q:"「ㄕㄨˋ」立志向的國字是？", options:[{t:"樹",c:true},{t:"豎",c:false}] },
  { q:"「ㄆㄧㄣˊ」ㄆㄧㄣˊ叫好的國字是？", options:[{t:"頻",c:true},{t:"蘋",c:false}] },
  { q:"眼「ㄇㄡˊ」的國字是？", options:[{t:"眸",c:true},{t:"謀",c:false}] },
  { q:"「ㄍㄨ」負期望的國字是？", options:[{t:"辜",c:true},{t:"孤",c:false}] },
  { q:"不「ㄎㄢ」入目的國字是？", options:[{t:"堪",c:true},{t:"勘",c:false}] },
  { q:"一敗「ㄊㄨˊ」地的國字是？", options:[{t:"塗",c:true},{t:"途",c:false}] },
  { q:"陰「霾」消散的注音是？", options:[{t:"ㄇㄞˊ",c:true},{t:"ㄌㄧˊ",c:false}] },
  { q:"「蟄」伏的注音是？", options:[{t:"ㄓˊ",c:true},{t:"ㄓㄜˊ",c:false}] },
  { q:"「ㄅㄢ」回一城的國字是？", options:[{t:"扳",c:true},{t:"搬",c:false}] },
  { q:"「揶」揄的注音是？", options:[{t:"ㄧㄝˊ",c:true},{t:"ㄧㄝ",c:false}] },
  { q:"「鴻」雁的注音是？", options:[{t:"ㄏㄨㄥˊ",c:true},{t:"ㄍㄨㄥˊ",c:false}] },
  { q:"「皎」潔的注音是？", options:[{t:"ㄐㄧㄠˇ",c:true},{t:"ㄐㄧㄠˋ",c:false}] },
  { q:"「徘徊」的注音是？", options:[{t:"ㄆㄞˊㄏㄨㄞˊ",c:true},{t:"ㄈㄟˊㄏㄨㄞˊ",c:false}] },
  { q:"「ㄔㄡˊ」緒滿懷的國字是？", options:[{t:"愁",c:true},{t:"仇",c:false}] },
  { q:"「孤帆」的「帆」字注音是？", options:[{t:"ㄈㄢˊ",c:true},{t:"ㄈㄢ",c:false}] }
];

// ================= 房間地圖 =================
const rooms = {
  "r_start": {
    name:"霧起山徑", type:"quiz", qIdx:1,
    story:"【詩魂低語】忘詩之霧緩緩散開，你聽見遠方傳來一句殘詩……「床前明月光，疑是地上霜，舉頭望明月，低頭＿故鄉。」缺失的字，正是開啟迷宮的第一把鑰匙。",
    q:"請選出正確的字填入空格：「低頭＿故鄉」", qType:"single",
    opts:[{id:"A",text:"思"},{id:"B",text:"望"},{id:"C",text:"念"},{id:"D",text:"憶"}], ans:"A",
    rewardItem:"🌙", onClear:"r_hall1"
  },
  "r_hall1": {
    name:"竹林岔路", type:"nav",
    story:"霧氣在竹林間流動，三條小徑分別通往不同的方向，隱約能聽見鳥鳴與水聲。",
    exits:[
      { dir:"沿小徑向北", target:"r_door1" },
      { dir:"循鳥鳴向東", target:"r_npc1" },
      { dir:"望水聲向西", target:"r_flavor1" }
    ]
  },
  "r_flavor1": {
    name:"墨池遺跡", type:"flavor",
    story:"你在一池墨水旁發現一塊石碑，上面寫著：\n\n「詩，是古人凝鍊心情的文字。一首五言絕句僅僅二十字，卻能道盡思念、喜悅、惆悵。讀詩時，不妨想像詩人當下的心境——他在何處？看見了什麼？心裡又想著誰？」\n\n池水映出你的倒影，似乎也映出了詩人當年的身影。",
    onClear:"r_hall1"
  },
  "r_npc1": {
    name:"鳥鳴幻境", type:"npc",
    story:"林間突然出現一位戴著斗笠的旅人：『此路被忘詩之霧封鎖，你需答對幾道字音字形題，我才能放行……』",
    onClear:"r_hall1"
  },
  "r_door1": {
    name:"月光石門", type:"lock", reqItem:"🌙",
    story:"【封印石門】\n門上刻著一輪明月：『請以月光碎片喚醒封印。』",
    onUnlock:"r_q2", onFail:"r_hall1"
  },

// ================= 全息地圖 =================
function updateHologramMap() {
  const grid = document.getElementById('dynamic-map-grid');
  if (!grid) return;
  grid.innerHTML = "";
  mapLayoutOrder.forEach(id => {
    if (!rooms[id]) return;
    let cell = document.createElement('div');
    if (id === currentRoom) {
      cell.className = "map-cell current";
      cell.innerText = rooms[id].name;
    } else if (visitedNodes.has(id)) {
      cell.className = "map-cell unlocked";
      cell.innerText = rooms[id].name;
      cell.onclick = () => { renderEngine(id); };
    } else {
      cell.className = "map-cell";
      cell.innerText = "？？？";
    }
    grid.appendChild(cell);
  });
}

// ================= 核心渲染引擎 =================
function renderEngine(roomId) {
  try {
    if (!rooms[roomId]) return;
    currentRoom = roomId; const room = rooms[roomId]; visitedNodes.add(roomId);
    document.getElementById('current-location').innerText = `📍 目前位置：【${room.name}】`;
    document.body.className = room.type === "end" ? "bg-ending" : "";
    const contentDiv = document.getElementById('game-content'); let html = "";
    updateHologramMap();

    if (room.type === "nav") {
      html += `<h2 style="text-align:center; color:var(--accent-color); font-size:18px;">🧭 詩境岔路</h2>`;
      html += `<div class="story-text" style="text-align:center; font-style:italic;">${room.story}</div>`;
      html += `<div class="doors-container">`;
      room.exits.forEach(ex => {
        let isTargetOpened = visitedNodes.has(ex.target);
        let tName = isTargetOpened ? rooms[ex.target].name : "未知之境";
        let tClass = isTargetOpened ? "door-name" : "door-name door-unknown";
        html += `<div class="door-card" onclick="renderEngine('${ex.target}')">
                  <div class="door-dir">🚪 ${ex.dir}</div>
                  <div class="${tClass}">${tName}</div>
                </div>`;
      });
      html += `</div>`;
    }
    else if (room.type === "flavor") {
      html = `<div class="story-box" style="border-color:var(--item-color); color:var(--item-color);">【詩境見聞】</div>
              <div class="story-text">${room.story}</div>
              <button type="button" class="action-btn" onclick="renderEngine('${room.onClear}')">收穫見聞，返回岔路</button>`;
    }
    else if (room.type === "npc") {
      let visits = npcVisits[roomId] || 0;
      let requiredQ = (visits === 0) ? 2 : 4;
      let pool = [...trapDatabase]; shuffleArray(pool);
      currentNpcQuestions = pool.slice(0, requiredQ);
      currentNpcIndex = 0;
      html = `<div class="story-box" style="border-color:var(--error-color);">【偶遇】</div>
              <div class="story-text">${room.story}</div>
              <div class="quiz-card">
                <div class="type-badge">⚡ 字音字形挑戰（連續答對 ${requiredQ} 題可得墨水）</div>
                <div id="npc-quiz-area"></div>
                <div id="npc-msg" class="message"></div>
                <button type="button" id="npc-leave-btn" class="action-btn hidden" onclick="renderEngine('${room.onClear}')">離開此地</button>
              </div>`;
      contentDiv.innerHTML = html; contentDiv.classList.remove('hidden');
      renderNpcQuestion(roomId);
      return;
    }
    else if (room.type === "lock") {
      html = `<h2 style="color:var(--item-color); text-align:center; font-size:18px;">${room.name}</h2>
              <div class="story-text" style="border-color:var(--item-color); text-align:center; white-space:pre-wrap;">${room.story}</div>
              <div style="color:var(--sub-text); margin-bottom:18px; font-weight:bold; font-size:14px; text-align:center;">
                👆 點擊上方背包中的道具，嘗試開啟封印 👆
              </div>
              <div id="lock-msg" class="message"></div>
              <button type="button" class="action-btn" style="margin-top:14px; border-color:var(--sub-text); color:var(--sub-text);" onclick="renderEngine('${room.onFail || 'r_hall1'}')">暫且離開，返回岔路</button>`;
    }
    else if (room.type === "combine") {
      activeCombineSlot = null; combineSelected = [null, null];
      html = `<h2 style="color:var(--error-color); text-align:center; font-size:18px;">${room.name}</h2>
              <div class="story-text" style="border-color:var(--error-color); text-align:center; white-space:pre-wrap;">${room.story}</div>
              <div style="font-size:13px; color:var(--sub-text); margin-bottom:14px; font-weight:bold; text-align:center;">

              <div class="combine-container">
                <div class="combine-slot" id="slot-1" onclick="selectCombineSlot(1)"><span style="font-size:14px;">凹槽 1</span></div>
                <div style="font-size:26px; color:var(--error-color);">+</div>
                <div class="combine-slot" id="slot-2" onclick="selectCombineSlot(2)"><span style="font-size:14px;">凹槽 2</span></div>
              </div>
              <button type="button" class="action-btn" style="border-color:var(--error-color); color:var(--error-color); margin-top:18px;" onclick="attemptCombine('${roomId}')">融合詩稿</button>
              <div id="combine-msg" class="message"></div>`;
    }
    else if (room.type === "quiz") {
      let progress = roomHintsProgress[roomId] || 0;
      let hints = shortAnswerHints[roomId];
      let showPotionBtn = (hints && potions > 0 && progress < hints.length) ? 'style="display:block;"' : 'style="display:none;"';
      let preHintsHtml = "";
      if (hints && progress > 0) { for (let i=0;i<progress;i++) preHintsHtml += `<div class="msg-hint">${hints[i]}</div>`; }

      html = `<div class="story-box">${room.story}</div>
              <div class="quiz-card">
                <div class="question-text">${room.q}</div>
                <div id="hint-box" class="${progress > 0 ? '' : 'hidden'}">${preHintsHtml}</div>
                <button type="button" id="potion-btn" class="action-btn potion-btn" ${showPotionBtn} onclick="usePotion('${roomId}')">🖋️ 消耗 1 瓶墨水解鎖提示</button>
                <div id="interactive-area" style="margin-top:18px;"></div>
                <div id="word-count-div" class="word-count hidden">字數：0</div>
                <button type="button" class="action-btn" onclick="submitQuiz('${roomId}')">提交解答</button>
                <div id="msg-box" class="message"></div>
              </div>`;
    }
    else if (room.type === "end") {
      document.getElementById('status-ui').classList.add('hidden');
      document.getElementById('map-ui').classList.add('hidden');
      document.getElementById('main-container').classList.add('ending-fullscreen');

      let itemsHtml = '';
      itemCollection.forEach((icon, i) => {
        let angle = (i / Math.max(itemCollection.length,1)) * 2 * Math.PI;
        let startX = Math.round(Math.cos(angle) * 170) + 'px';
        let startY = Math.round(Math.sin(angle) * 170) + 'px';
        itemsHtml += `<div class="ending-item" style="--startX:${startX}; --startY:${startY}; animation-delay:${i*0.2}s;">${icon}</div>`;
      });

      html = `
        <div style="position:absolute; top:14%; text-align:center; color:#e8d9a8; font-size:18px; font-weight:bold; letter-spacing:5px; animation: fadeOutText 3s forwards; z-index:50;">
          [ 五詩合一・詩魂甦醒 ]
        </div>
        <div class="ending-items-container">
          ${itemsHtml}
          <div class="scroll-glow"></div>
          <div class="flying-blossom">🌸</div>
          <div class="final-text-victory">
            <h1 style="font-size:34px; margin-bottom:6px; letter-spacing:8px;">詩 魂 歸 位</h1>
            <div style="font-size:16px; font-weight:bold; letter-spacing:3px;">五首詩稿，重歸詩國</div>
            <div style="font-size:13px; margin-top:18px; color:#c9a14f;">旅人啊，感謝你喚醒了沉睡的詩魂。願你也能像古人一樣，在文字裡安放心情。</div>
          </div>
        </div>`;
    }

    contentDiv.innerHTML = html; contentDiv.classList.remove('hidden');

    if (room.type === "quiz") {
      const area = document.getElementById('interactive-area');
      if (room.qType === "single") {
        room.opts.forEach(opt => { area.innerHTML += `<label class="option-item"><input type="radio" name="q-choice" value="${opt.id}"><span>${opt.text}</span></label>`; });
      } else if (room.qType === "multi") {
        room.opts.forEach(opt => { area.innerHTML += `<label class="option-item"><input type="checkbox" name="q-choice" value="${opt.id}"><span>${opt.text}</span></label>`; });
      } else if (room.qType === "sort") {
        currentSortOrder = [...room.opts]; shuffleArray(currentSortOrder); renderSortList();
      } else {
        document.getElementById('word-count-div').classList.remove('hidden');
        area.innerHTML = `<textarea id="short-answer" placeholder="請寫下你的想法..." oninput="updateWordCount(this)"></textarea>`;
      }
    }
  } catch (error) { alert("系統載入異常，請重新整理！錯誤：" + error.message); }
}

// === NPC 引擎 ===
function renderNpcQuestion(roomId) {
  let qData = currentNpcQuestions[currentNpcIndex];
  let opts = [...qData.options]; shuffleArray(opts);
  let html = `
    <div class="question-text">進度（${currentNpcIndex+1}/${currentNpcQuestions.length}）：${qData.q}</div>
    <div>
      <label class="option-item"><input type="radio" name="npc-choice" value="${opts[0].c}"><span>${opts[0].t}</span></label>
      <label class="option-item"><input type="radio" name="npc-choice" value="${opts[1].c}"><span>${opts[1].t}</span></label>
    </div>
    <button type="button" class="action-btn" style="border-color:var(--error-color); color:var(--error-color);" onclick="submitNpc('${roomId}')">確認送出</button>
  `;
  document.getElementById('npc-quiz-area').innerHTML = html;
}

function submitNpc(roomId) {
  const selected = document.querySelector('input[name="npc-choice"]:checked');
  if (!selected) { showMsg('npc-msg', "⚠️ 必須做出選擇！", false); return; }
  let qData = currentNpcQuestions[currentNpcIndex];
  let correctAns = qData.options.find(o=>o.c).t;

  if (selected.value === "true") {
    currentNpcIndex++;
    if (currentNpcIndex < currentNpcQuestions.length) {
      showMsg('npc-msg', `🟢 正確！準備下一題...`, true);
      setTimeout(() => { hideMsg('npc-msg'); renderNpcQuestion(roomId); }, 900);
    } else {
      document.getElementById('npc-quiz-area').innerHTML = "";
      potions++; updateInventoryUI();
      npcVisits[roomId] = (npcVisits[roomId] || 0) + 1;
      showMsg('npc-msg', "🎉 全部答對！獲得【🖋️ 墨水 x 1】", true);
      document.getElementById('npc-leave-btn').classList.remove('hidden');
    }
  } else {
    document.getElementById('npc-quiz-area').innerHTML = "";
    showMsg('npc-msg', `❌ 錯誤！正確答案是「${correctAns}」。對方搖頭離去了……`, false);
    document.getElementById('npc-leave-btn').classList.remove('hidden');
  }
}

// === 物品觀察 ===
function inspectItem() {
  document.getElementById('modal-inspect-btn').classList.add('hidden');
  let textDiv = document.getElementById('modal-inspect-text');
  let info = getItemInfo(inspectingItem);
  textDiv.innerHTML = info.inspect;
  textDiv.classList.remove('hidden');
}

function checkPassword(roomId) {}

function usePotion(roomId) {
  let hints = shortAnswerHints[roomId];
  if (!hints) return;
  let progress = roomHintsProgress[roomId] || 0;
  if (potions > 0 && progress < hints.length) {
    potions--; updateInventoryUI();
    let hintBox = document.getElementById('hint-box');
    hintBox.innerHTML += `<div class="msg-hint">${hints[progress]}</div>`;
    hintBox.classList.remove('hidden');
    roomHintsProgress[roomId] = progress + 1;
    if (roomHintsProgress[roomId] >= hints.length) { document.getElementById('potion-btn').style.display = 'none'; }
  }
}

function submitQuiz(roomId) {
  const room = rooms[roomId]; let isCorrect = false;

  if (room.qType === "single") {
    const selected = document.querySelector('input[name="q-choice"]:checked');
    if (!selected) { showMsg('msg-box', "⚠️ 請先選擇一個答案！", false); return; }
    isCorrect = (selected.value === room.ans);
  } else if (room.qType === "multi") {
    const checkedBoxes = document.querySelectorAll('input[name="q-choice"]:checked');
    const ansArray = Array.from(checkedBoxes).map(cb => cb.value);
    if (ansArray.length === 0) { showMsg('msg-box', "⚠️ 請至少選擇一個答案！", false); return; }
    isCorrect = ansArray.length === room.ans.length && ansArray.every(val => room.ans.includes(val));
  } else if (room.qType === "sort") {
    const ids = currentSortOrder.map(i => i.id);
    isCorrect = ids.every((val, i) => val === room.ans[i]);
  } else {
    const field = document.getElementById('short-answer');
    const ansStr = field ? field.value.trim() : "";
    if (ansStr.length < room.minW) { showMsg('msg-box', `⚠️ 寫得還不夠完整（需至少 ${room.minW} 字）！`, false); return; }
    isCorrect = true;
  }

  if (!isCorrect) {
    let errMsg = room.qType === "sort" ? "❌ 順序不正確，請重新調整！" : "❌ 答案不正確，再想想看！";
    showMsg('msg-box', errMsg, false);
    let progress = roomHintsProgress[roomId] || 0;
    let hints = shortAnswerHints[roomId];
    if (hints && potions > 0 && progress < hints.length) { document.getElementById('potion-btn').style.display = 'block'; }
    return;
  }

  showMsg('msg-box', "🟢 答對了！獲得詩稿碎片……", true);
  if (!itemCollection.includes(room.rewardItem)) itemCollection.push(room.rewardItem);
  if (room.givesPotion) { potions++; }
  updateInventoryUI();
  setTimeout(() => { showItemReward(roomId); }, 1300);
}

function showItemReward(roomId) {
  const room = rooms[roomId]; const itemInfo = getItemInfo(room.rewardItem);
  let html = `<div class="item-box" style="margin:0 auto;"><div class="item-icon">${room.rewardItem}</div><div class="item-title">獲得道具：【${itemInfo.title}】</div><div class="item-desc">${itemInfo.desc}</div></div>`;
  if (room.givesPotion) { html += `<div style="color:var(--success-color); font-weight:bold; text-align:center; margin-top:18px; font-size:15px;">🎉 額外獲得【🖋️ 墨水 x 1】</div>`; }
  html += `<button type="button" class="action-btn" style="margin-top:26px;" onclick="renderEngine('${room.onClear}')">收下道具，繼續前行</button>`;
  document.getElementById('game-content').innerHTML = html;
}

// === 背包與融合 ===
function handleInventoryClick(idx) {
  const rawIcon = itemCollection[idx]; const room = rooms[currentRoom];
  const cleanStr = s => s ? s.replace(/\uFE0F/g, '').trim() : '';

  if (room && room.type === 'lock') {
    if (cleanStr(rawIcon) === cleanStr(room.reqItem)) {
      showMsg('lock-msg', '🟢 封印解除！石門緩緩開啟……', true);
      setTimeout(() => { renderEngine(room.onUnlock); }, 1300);
    } else {
      showMsg('lock-msg', '❌ 此物與封印不合，毫無反應。', false);
      openInspectModal(rawIcon);
    }
  } else if (room && room.type === 'combine') {
    if (activeCombineSlot) {
      if (cleanStr(combineSelected[0]) === cleanStr(rawIcon) || cleanStr(combineSelected[1]) === cleanStr(rawIcon)) {
        showMsg('combine-msg', '⚠️ 這個道具已經放入凹槽了！', false); return;
      }
      combineSelected[activeCombineSlot-1] = rawIcon;
      let slotElem = document.getElementById('slot-' + activeCombineSlot);
      slotElem.innerText = rawIcon; slotElem.classList.remove('active-slot'); slotElem.classList.add('filled');
      activeCombineSlot = null; hideMsg('combine-msg');
    } else { openInspectModal(rawIcon); }
  } else { openInspectModal(rawIcon); }
}

function openInspectModal(icon) {
  inspectingItem = icon; const info = getItemInfo(icon);
  document.getElementById('modal-icon').innerText = icon;
  document.getElementById('modal-title').innerText = info.title;
  document.getElementById('modal-desc').innerText = info.desc;
  document.getElementById('modal-inspect-text').classList.add('hidden');
  document.getElementById('modal-inspect-btn').classList.remove('hidden');
  document.getElementById('item-modal').classList.remove('hidden');
}

function closeItemModal() { document.getElementById('item-modal').classList.add('hidden'); }
function selectCombineSlot(n) { activeCombineSlot = n; document.getElementById('slot-1').classList.remove('active-slot'); document.getElementById('slot-2').classList.remove('active-slot'); document.getElementById('slot-'+n).classList.add('active-slot'); hideMsg('combine-msg'); }

function attemptCombine(roomId) {
  let room = rooms[roomId]; const cleanStr = s => s ? s.replace(/\uFE0F/g, '').trim() : '';
  let target = room.target.map(cleanStr); let c0 = cleanStr(combineSelected[0]); let c1 = cleanStr(combineSelected[1]);

  if (c0 && c1 && target.includes(c0) && target.includes(c1) && c0 !== c1) {
    showMsg('combine-msg', `🟢 融合成功！煉成【${room.resName}】，前路已開啟！`, true);
    if (!itemCollection.includes(room.resIcon)) { itemCollection.push(room.resIcon); updateInventoryUI(); }
    setTimeout(() => { renderEngine(room.onUnlock); }, 1700);
  } else {
    showMsg('combine-msg', "❌ 融合失敗！這兩樣道具似乎不合，請重新選擇。", false);
    combineSelected = [null, null];
    document.getElementById('slot-1').innerHTML = '<span style="font-size:14px;">凹槽 1</span>';
    document.getElementById('slot-2').innerHTML = '<span style="font-size:14px;">凹槽 2</span>';
    document.getElementById('slot-1').className = "combine-slot";
    document.getElementById('slot-2').className = "combine-slot";
  }
}

// === 工具函式 ===
function updateInventoryUI() {
  let html = '';
  itemCollection.forEach((icon, i) => { html += `<span class="inv-item" title="點擊查看" onclick="handleInventoryClick(${i})">${icon}</span>`; });
  document.getElementById('inventory-list').innerHTML = html;
  document.getElementById('potion-count').innerText = potions;
}
function renderSortList() {
  const area = document.getElementById('interactive-area'); area.innerHTML = "";
  currentSortOrder.forEach((item, index) => {
    area.innerHTML += `<div class="sort-item"><div class="sort-text">${item.text}</div><div class="sort-btns"><button type="button" class="sort-btn" onclick="moveItem(${index},-1)">▲</button><button type="button" class="sort-btn" onclick="moveItem(${index},1)">▼</button></div></div>`;
  });
}
function moveItem(index, dir) {
  const target = index + dir; if (target < 0 || target >= currentSortOrder.length) return;
  [currentSortOrder[index], currentSortOrder[target]] = [currentSortOrder[target], currentSortOrder[index]];
  renderSortList();
}
function shuffleArray(arr) { for (let i=arr.length-1;i>0;i--) { const j = Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } }
function updateWordCount(t) { document.getElementById('word-count-div').innerText = `字數：${t.value.length}`; }
function showMsg(boxId, text, isSuccess) {
  const box = document.getElementById(boxId);
  if (box) { box.innerText = text; box.className = isSuccess ? "message msg-success" : "message msg-error"; }
}
function hideMsg(boxId) { const b = document.getElementById(boxId); if (b) b.className = "message hidden"; }

function startGame() {
  document.getElementById('login-section').classList.add('hidden');
  document.getElementById('status-ui').classList.remove('hidden');
  document.getElementById('map-ui').classList.remove('hidden');
  updateInventoryUI();
  renderEngine("r_start");
}
</script>
